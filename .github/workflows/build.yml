name: Build (Windows MSVC)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          # Qt SVG ships inside the base Qt 6 install — it is NOT a separately
          # listable aqt module, so requesting it here makes the install fail.
          cache: true

      - name: Configure CMake
        # Let CMake pick whatever Visual Studio the runner has (pinning a
        # version breaks when the image updates). QT_ROOT_DIR is set by
        # install-qt-action and points at the Qt prefix.
        run: cmake -B build -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT_DIR }}"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ULTRA_Ditherer-windows
          path: build/Release/
          if-no-files-found: warn
