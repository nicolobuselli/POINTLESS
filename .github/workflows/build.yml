name: Build (Windows MSVC)

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          # Qt SVG ships inside the base Qt 6 install — it is NOT a separately
          # listable aqt module, so requesting it here makes the install fail.
          # ShaderTools (needed by CMakeLists.txt for the GPU renderer) IS a
          # separate module and must be requested explicitly.
          modules: 'qtshadertools'
          cache: true

      - name: Fetch ffmpeg
        run: ./tools/fetch-ffmpeg.ps1

      - name: Configure CMake
        # Let CMake pick whatever Visual Studio the runner has (pinning a
        # version breaks when the image updates). QT_ROOT_DIR is set by
        # install-qt-action and points at the Qt prefix.
        run: cmake -B build -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT_DIR }}"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: POINTLESS-windows
          path: build/Release/
          if-no-files-found: warn

      - name: Zip release package
        if: startsWith(github.ref, 'refs/tags/v')
        run: Compress-Archive -Path build/Release/* -DestinationPath POINTLESS-windows-${{ github.ref_name }}.zip

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: POINTLESS-windows-${{ github.ref_name }}.zip
